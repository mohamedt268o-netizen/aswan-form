<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل حالات الانتظار - الهيئة العامة للرعاية الصحية</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Cairo',sans-serif; background:#eef2f7; direction:rtl; min-height:100vh; }

.header {
  background: linear-gradient(135deg,#0a2342,#1a3a5c);
  color:white; padding:16px 20px;
}
.header-top { display:flex; align-items:center; gap:12px; }
.header-top .icon { font-size:1.8rem; }
.header-top h1 { font-size:1rem; font-weight:900; }
.header-top p  { font-size:.7rem; opacity:.65; margin-top:2px; }
.header-meta {
  margin-top:10px; background:rgba(255,255,255,.1);
  border-radius:8px; padding:7px 12px; font-size:.75rem;
  display:flex; justify-content:space-between;
}

.main { max-width:980px; margin:0 auto; padding:14px 10px 80px; }

.card {
  background:#fff; border-radius:14px; border:1px solid #d1dbe8;
  box-shadow:0 4px 20px rgba(10,35,66,.08); margin-bottom:14px; overflow:hidden;
}
.card-head {
  background:linear-gradient(90deg,#0a2342,#1a3a5c);
  padding:11px 16px; color:white; font-weight:700; font-size:.86rem;
  display:flex; align-items:center; justify-content:space-between;
}
.card-body { padding:14px; }

/* Hospital row */
.hosp-row { display:flex; gap:12px; flex-wrap:wrap; }
.field { flex:1; min-width:160px; }
.field label { display:block; font-size:.78rem; font-weight:700; color:#0a2342; margin-bottom:5px; }
.req { color:#e63946; }

input, select {
  width:100%; border:2px solid #d1dbe8; border-radius:8px;
  padding:8px 10px; font-family:'Cairo',sans-serif; font-size:.82rem;
  background:#f8fafc; color:#0a2342; outline:none;
  transition:border-color .2s, background .2s;
}
input:focus, select:focus { border-color:#2196F3; background:#fff; }
input.err, select.err { border-color:#e63946; background:#fff5f5; }
.err-msg { color:#e63946; font-size:.68rem; margin-top:3px; display:none; }
.err-msg.show { display:block; }

/* Table */
.tbl-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; min-width:740px; }
thead th {
  padding:9px 7px; font-size:.7rem; font-weight:700; color:#0a2342;
  text-align:right; border-bottom:2px solid #d1dbe8; background:#f0f4f8;
  white-space:nowrap;
}
tbody tr { border-bottom:1px solid #e2e8f0; }
tbody tr:nth-child(even) { background:#f8fafc; }
tbody td { padding:7px 5px; vertical-align:top; }

.row-num {
  width:24px; height:24px; border-radius:50%; background:#0a2342; color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-size:.68rem; font-weight:900; margin:auto;
}

/* Care buttons */
.care-opts { display:flex; flex-direction:column; gap:3px; }
.care-btn {
  display:flex; align-items:center; gap:4px; cursor:pointer;
  border:2px solid #d1dbe8; border-radius:6px; padding:3px 7px;
  font-size:.72rem; font-weight:700; color:#64748b; background:#f8fafc;
  transition:all .15s; user-select:none;
}
.care-btn:hover { border-color:#2196F3; }
.care-btn.sel-icu { border-color:#e63946; background:#fde8e9; color:#e63946; }
.care-btn.sel-ccu { border-color:#f4a261; background:#fff3e0; color:#e65100; }
.care-btn.sel-nicu{ border-color:#6366f1; background:#ede9fe; color:#6366f1; }

.del-btn {
  background:#fde8e9; color:#e63946; border:none; border-radius:7px;
  width:28px; height:28px; cursor:pointer; font-size:.9rem;
  display:flex; align-items:center; justify-content:center;
}
.del-btn:disabled { background:#f0f4f8; color:#b0bec5; cursor:not-allowed; }

/* Add row */
.add-row { padding:11px 14px; border-top:2px dashed #d1dbe8; }
.add-btn {
  background:#f0f4f8; color:#0a2342; border:2px dashed #d1dbe8; border-radius:10px;
  padding:9px 18px; font-family:'Cairo',sans-serif; font-size:.83rem; font-weight:700;
  cursor:pointer; display:flex; align-items:center; gap:8px;
}
.add-btn:hover { background:#e8f0fe; border-color:#2196F3; }
.add-plus {
  width:22px; height:22px; border-radius:50%; background:#0a2342; color:#fff;
  display:flex; align-items:center; justify-content:center; font-size:1rem; font-weight:900;
}

/* Summary */
.summary {
  background:#fff; border-radius:12px; border:1px solid #d1dbe8;
  padding:11px 14px; margin-bottom:14px;
  display:flex; gap:10px; flex-wrap:wrap; align-items:center;
}
.badge {
  border-radius:20px; padding:3px 12px; font-size:.76rem; font-weight:800;
}
.badge-icu  { background:#fde8e9; color:#e63946; }
.badge-ccu  { background:#fff3e0; color:#e65100; }
.badge-nicu { background:#ede9fe; color:#6366f1; }
.badge-total{ background:#e8f0fe; color:#0a2342; margin-right:auto; }
.sum-label  { font-size:.76rem; font-weight:700; color:#64748b; }

/* Submit */
.submit-btn {
  width:100%; background:linear-gradient(135deg,#0a2342,#1a3a5c);
  color:#fff; border:none; border-radius:14px; padding:15px;
  font-family:'Cairo',sans-serif; font-size:1rem; font-weight:900;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  gap:10px; box-shadow:0 6px 24px rgba(10,35,66,.25); transition:all .2s;
}
.submit-btn:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(10,35,66,.3); }
.submit-btn:disabled { background:#94a3b8; cursor:not-allowed; transform:none; }

/* Alert */
.alert {
  border-radius:10px; padding:12px 16px; margin-bottom:14px;
  font-size:.82rem; display:flex; gap:8px; align-items:center; display:none;
}
.alert.show { display:flex; }
.alert-err  { background:#fde8e9; border:1px solid #fca5a5; color:#e63946; }
.alert-ok   { background:#f0fdf4; border:1px solid #86efac; color:#166534; }

/* Success screen */
.success-screen {
  display:none; flex-direction:column; align-items:center;
  justify-content:center; min-height:100vh; padding:20px;
  background:#eef2f7;
}
.success-screen.show { display:flex; }
.success-card {
  background:#fff; border-radius:20px; padding:36px 24px; text-align:center;
  max-width:440px; width:100%; box-shadow:0 8px 40px rgba(10,35,66,.12);
}
.success-icon { font-size:3.5rem; margin-bottom:12px; }
.success-title { font-weight:900; font-size:1.2rem; color:#0a2342; margin-bottom:6px; }
.success-sub   { font-size:.82rem; color:#64748b; margin-bottom:16px; line-height:1.8; }
.success-list  { background:#f8fafc; border-radius:10px; padding:12px; margin-bottom:16px; text-align:right; }
.success-row   { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid #e2e8f0; }
.success-row:last-child { border-bottom:none; }
.new-btn {
  background:linear-gradient(135deg,#0a2342,#1a3a5c); color:#fff; border:none;
  border-radius:10px; padding:13px; font-family:'Cairo',sans-serif;
  font-size:.95rem; font-weight:800; cursor:pointer; width:100%;
}
</style>
</head>
<body>

<!-- SUCCESS SCREEN -->
<div class="success-screen" id="successScreen">
  <div class="success-card">
    <div class="success-icon">✅</div>
    <div class="success-title">تم الإرسال بنجاح!</div>
    <div class="success-sub" id="successMsg"></div>
    <div class="success-list" id="successList"></div>
    <button class="new-btn" onclick="resetForm()">+ تسجيل حالات جديدة</button>
  </div>
</div>

<!-- MAIN FORM -->
<div id="mainForm">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <span class="icon">🏥</span>
      <div>
        <h1>تسجيل حالات الانتظار اليومي</h1>
        <p>الهيئة العامة للرعاية الصحية · فرع أسوان</p>
      </div>
    </div>
    <div class="header-meta">
      <span id="todayDate">📅</span>
      <span id="nowTime">🕐</span>
    </div>
  </div>

  <div class="main">

    <!-- Alerts -->
    <div class="alert alert-err" id="alertErr">⚠️ <span id="alertMsg">حدث خطأ — أعد المحاولة</span></div>

    <!-- Hospital -->
    <div class="card">
      <div class="card-head">🏨 بيانات المستشفى</div>
      <div class="card-body">
        <div class="hosp-row">
          <div class="field">
            <label><span class="req">★ </span>اسم المستشفى</label>
            <select id="hospital">
              <option value="">— اختر المستشفى —</option>
              <option>اسوان التخصصي</option>
              <option>النيل التخصصي</option>
              <option>كوم امبو</option>
              <option>دراو المركزي</option>
              <option>السباعية</option>
              <option>المسلة التخصصي</option>
              <option>إدفو المركزي</option>
              <option>كلوع المركزي</option>
              <option>أبو سمبل</option>
              <option>نصر النوبة</option>
            </select>
            <div class="err-msg" id="hospErr">⚠ يرجى اختيار المستشفى</div>
          </div>
          <div class="field" style="max-width:180px">
            <label>📅 تاريخ التقرير</label>
            <input type="date" id="reportDate">
          </div>
        </div>
      </div>
    </div>

    <!-- Cases Table -->
    <div class="card">
      <div class="card-head">
        <span>📋 بيانات الحالات</span>
        <span id="caseCount" style="background:rgba(255,255,255,.15);border-radius:20px;padding:3px 12px;font-size:.74rem;">1 حالة</span>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>اسم المريض ★</th>
              <th>السن ★</th>
              <th>التشخيص ★</th>
              <th>الاحتياج ★</th>
              <th>موقف الحالة ★</th>
              <th>ساعة الدخول</th>
              <th>ملاحظات</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="casesBody"></tbody>
        </table>
      </div>
      <div class="add-row">
        <button class="add-btn" onclick="addCase()">
          <span class="add-plus">+</span>
          إضافة حالة جديدة
        </button>
      </div>
    </div>

    <!-- Summary -->
    <div class="summary" id="summary">
      <span class="sum-label">📊 ملخص:</span>
      <span class="badge badge-total" id="totalBadge">الإجمالي: 1 حالة</span>
    </div>

    <!-- Submit -->
    <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">
      📤 إرسال الحالات دفعة واحدة إلى الشيت
    </button>

  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJQ75IE9hz8PWJ2IdvzoToTrc9RaodoeOZJ77QSTEjRQxSNj42YXSHO5tDdRdOh0qE5Q/exec";

let cases = [];
let caseIdCounter = 1;

// ===== INIT =====
window.onload = function() {
  // Date & time
  const now = new Date();
  const days = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  document.getElementById('todayDate').textContent = `📅 ${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
  document.getElementById('nowTime').textContent = `🕐 ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  document.getElementById('reportDate').value = now.toISOString().split('T')[0];
  addCase();
};

// ===== ADD CASE =====
function addCase() {
  const id = caseIdCounter++;
  cases.push({ id, name:'', age:'', diagnosis:'', care:'', status:'', time:'', notes:'' });
  renderTable();
}

// ===== REMOVE CASE =====
function removeCase(id) {
  if(cases.length <= 1) return;
  cases = cases.filter(c => c.id !== id);
  renderTable();
}

// ===== UPDATE FIELD =====
function updateField(id, field, val) {
  const c = cases.find(c => c.id === id);
  if(c) c[field] = val;
  updateSummary();
}

// ===== SELECT CARE =====
function selectCare(id, care) {
  const c = cases.find(c => c.id === id);
  if(!c) return;
  c.care = care;
  // Update buttons
  ['ICU','CCU','NICU'].forEach(ct => {
    const btn = document.getElementById(`care-${id}-${ct}`);
    if(!btn) return;
    btn.className = 'care-btn' + (c.care === ct ? ` sel-${ct.toLowerCase()}` : '');
  });
  updateSummary();
}

// ===== RENDER TABLE =====
function renderTable() {
  const tbody = document.getElementById('casesBody');
  tbody.innerHTML = '';
  cases.forEach((c, idx) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="text-align:center"><div class="row-num">${idx+1}</div></td>
      <td style="min-width:155px">
        <input value="${c.name}" oninput="updateField(${c.id},'name',this.value)" placeholder="الاسم كاملاً" id="name-${c.id}">
        <div class="err-msg" id="err-name-${c.id}">⚠ مطلوب</div>
      </td>
      <td style="min-width:68px">
        <input type="number" value="${c.age}" oninput="updateField(${c.id},'age',this.value)" placeholder="السن" min="0" max="120" id="age-${c.id}">
        <div class="err-msg" id="err-age-${c.id}">⚠</div>
      </td>
      <td style="min-width:135px">
        <input value="${c.diagnosis}" oninput="updateField(${c.id},'diagnosis',this.value)" placeholder="التشخيص" id="diag-${c.id}">
        <div class="err-msg" id="err-diag-${c.id}">⚠ مطلوب</div>
      </td>
      <td style="min-width:95px">
        <div class="care-opts">
          <div id="care-${c.id}-ICU"  class="care-btn${c.care==='ICU'?' sel-icu':''}"  onclick="selectCare(${c.id},'ICU')">🫁 ICU</div>
          <div id="care-${c.id}-CCU"  class="care-btn${c.care==='CCU'?' sel-ccu':''}"  onclick="selectCare(${c.id},'CCU')">❤️ CCU</div>
          <div id="care-${c.id}-NICU" class="care-btn${c.care==='NICU'?' sel-nicu':''}" onclick="selectCare(${c.id},'NICU')">👶 NICU</div>
        </div>
        <div class="err-msg" id="err-care-${c.id}">⚠ مطلوب</div>
      </td>
      <td style="min-width:175px">
        <select id="status-${c.id}" onchange="updateField(${c.id},'status',this.value)">
          <option value="">— اختر —</option>
          <option ${c.status==='انتظار دخول عناية أو تحويل'?'selected':''}>انتظار دخول عناية أو تحويل</option>
          <option ${c.status==='جاري التنسيق'?'selected':''}>جاري التنسيق</option>
          <option ${c.status==='جاري التسكين بعناية المستشفى'?'selected':''}>جاري التسكين بعناية المستشفى</option>
          <option ${c.status==='جاري التسكين بقسم داخلي'?'selected':''}>جاري التسكين بقسم داخلي</option>
          <option ${c.status==='على جهاز تنفس - غير مستقر'?'selected':''}>على جهاز تنفس - غير مستقر</option>
          <option ${c.status==='تم التسكين'?'selected':''}>تم التسكين</option>
          <option ${c.status==='خروج تحسن'?'selected':''}>خروج تحسن</option>
        </select>
        <div class="err-msg" id="err-status-${c.id}">⚠ مطلوب</div>
      </td>
      <td style="min-width:88px">
        <input type="time" value="${c.time}" onchange="updateField(${c.id},'time',this.value)">
      </td>
      <td style="min-width:125px">
        <input value="${c.notes}" oninput="updateField(${c.id},'notes',this.value)" placeholder="مكان التحويل / ملاحظات">
      </td>
      <td>
        <button class="del-btn" onclick="removeCase(${c.id})" ${cases.length<=1?'disabled':''}>🗑</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
  updateSummary();
}

// ===== SUMMARY =====
function updateSummary() {
  const summary = document.getElementById('summary');
  const total = cases.length;
  const icu  = cases.filter(c=>c.care==='ICU').length;
  const ccu  = cases.filter(c=>c.care==='CCU').length;
  const nicu = cases.filter(c=>c.care==='NICU').length;

  let html = '<span class="sum-label">📊 ملخص:</span>';
  if(icu)  html += `<span class="badge badge-icu">ICU: ${icu}</span>`;
  if(ccu)  html += `<span class="badge badge-ccu">CCU: ${ccu}</span>`;
  if(nicu) html += `<span class="badge badge-nicu">NICU: ${nicu}</span>`;
  html += `<span class="badge badge-total" style="margin-right:auto">الإجمالي: ${total} ${total===1?'حالة':'حالات'}</span>`;
  summary.innerHTML = html;

  document.getElementById('caseCount').textContent = `${total} ${total===1?'حالة':'حالات'}`;
  document.getElementById('submitBtn').textContent = `📤 إرسال ${total} ${total===1?'حالة':'حالات'} دفعة واحدة إلى الشيت`;
}

// ===== VALIDATE =====
function validate() {
  let valid = true;

  // Sync values from DOM first
  cases.forEach(c => {
    const nameEl   = document.getElementById(`name-${c.id}`);
    const ageEl    = document.getElementById(`age-${c.id}`);
    const diagEl   = document.getElementById(`diag-${c.id}`);
    const statusEl = document.getElementById(`status-${c.id}`);
    if(nameEl)   c.name      = nameEl.value;
    if(ageEl)    c.age       = ageEl.value;
    if(diagEl)   c.diagnosis = diagEl.value;
    if(statusEl) c.status    = statusEl.value;
  });

  const hospital = document.getElementById('hospital').value;
  if(!hospital) {
    document.getElementById('hospErr').classList.add('show');
    document.getElementById('hospital').classList.add('err');
    valid = false;
  } else {
    document.getElementById('hospErr').classList.remove('show');
    document.getElementById('hospital').classList.remove('err');
  }

  cases.forEach(c => {
    if(!c.name.trim()) {
      document.getElementById(`err-name-${c.id}`).classList.add('show');
      document.getElementById(`name-${c.id}`).classList.add('err');
      valid = false;
    } else {
      document.getElementById(`err-name-${c.id}`)?.classList.remove('show');
      document.getElementById(`name-${c.id}`)?.classList.remove('err');
    }
    if(!c.age) {
      document.getElementById(`err-age-${c.id}`).classList.add('show');
      document.getElementById(`age-${c.id}`).classList.add('err');
      valid = false;
    } else {
      document.getElementById(`err-age-${c.id}`)?.classList.remove('show');
      document.getElementById(`age-${c.id}`)?.classList.remove('err');
    }
    if(!c.diagnosis.trim()) {
      document.getElementById(`err-diag-${c.id}`).classList.add('show');
      document.getElementById(`diag-${c.id}`).classList.add('err');
      valid = false;
    } else {
      document.getElementById(`err-diag-${c.id}`)?.classList.remove('show');
      document.getElementById(`diag-${c.id}`)?.classList.remove('err');
    }
    if(!c.care) {
      document.getElementById(`err-care-${c.id}`).classList.add('show');
      valid = false;
    } else {
      document.getElementById(`err-care-${c.id}`)?.classList.remove('show');
    }
    if(!c.status) {
      document.getElementById(`err-status-${c.id}`).classList.add('show');
      document.getElementById(`status-${c.id}`).classList.add('err');
      valid = false;
    } else {
      document.getElementById(`err-status-${c.id}`)?.classList.remove('show');
      document.getElementById(`status-${c.id}`)?.classList.remove('err');
    }
  });
  return valid;
}

// ===== SUBMIT =====
async function handleSubmit() {
  if(!validate()) {
    document.querySelector('.err, .err-msg.show')?.scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '⏳ جاري الإرسال إلى Google Sheets...';
  document.getElementById('alertErr').classList.remove('show');

  // Sync final values
  cases.forEach(c => {
    const nameEl   = document.getElementById(`name-${c.id}`);
    const ageEl    = document.getElementById(`age-${c.id}`);
    const diagEl   = document.getElementById(`diag-${c.id}`);
    const statusEl = document.getElementById(`status-${c.id}`);
    if(nameEl)   c.name      = nameEl.value;
    if(ageEl)    c.age       = ageEl.value;
    if(diagEl)   c.diagnosis = diagEl.value;
    if(statusEl) c.status    = statusEl.value;
  });

  const hospital   = document.getElementById('hospital').value;
  const reportDate = document.getElementById('reportDate').value;

  const payload = {
    hospital, reportDate,
    cases: cases.map(c => ({
      name: c.name, age: c.age, diagnosis: c.diagnosis,
      care: c.care, status: c.status,
      time: c.time || '-', notes: c.notes || '-'
    }))
  };

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    // Show success
    const msg = document.getElementById('successMsg');
    msg.innerHTML = `تم تسجيل <strong style="color:#e63946">${cases.length} ${cases.length===1?'حالة':'حالات'}</strong> من <strong style="color:#0a2342">${hospital}</strong><br>في سجل الهيئة العامة للرعاية الصحية ✅`;

    const list = document.getElementById('successList');
    list.innerHTML = cases.map((c,i) => `
      <div class="success-row">
        <span style="width:22px;height:22px;border-radius:50%;background:#0a2342;color:#fff;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:900;flex-shrink:0">${i+1}</span>
        <span style="flex:1;font-size:.8rem;color:#0a2342;font-weight:600">${c.name}</span>
        <span style="background:${c.care==='ICU'?'#fde8e9':c.care==='CCU'?'#fff3e0':'#ede9fe'};color:${c.care==='ICU'?'#e63946':c.care==='CCU'?'#e65100':'#6366f1'};border-radius:5px;padding:2px 8px;font-size:.7rem;font-weight:800">${c.care}</span>
      </div>
    `).join('');

    document.getElementById('mainForm').style.display = 'none';
    document.getElementById('successScreen').classList.add('show');

  } catch(err) {
    document.getElementById('alertMsg').textContent = 'حدث خطأ في الاتصال — تأكد من الإنترنت وأعد المحاولة';
    document.getElementById('alertErr').classList.add('show');
    btn.disabled = false;
    updateSummary();
  }
}

// ===== RESET =====
function resetForm() {
  cases = []; caseIdCounter = 1;
  document.getElementById('hospital').value = '';
  document.getElementById('successScreen').classList.remove('show');
  document.getElementById('mainForm').style.display = 'block';
  addCase();
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
